mode = "batch"
sinks = "../sinks"
work_root = "."

[[sources]]
type = "file"
name = "seed_port_scan"
path = "data/port_scan.ndjson"
stream = "netflow"
data_format = "ndjson"

[runtime]
executor_parallelism = 2
rule_exec_timeout = "30s"
schemas = "../distinct/schemas/*.wfs"
rules   = "../distinct/rules/*.wfl"

[window_defaults]
evict_interval = "30s"
max_window_bytes = "256MB"
max_total_bytes = "2GB"
evict_policy = "time_first"
watermark = "5s"
allowed_lateness = "0s"
late_policy = "drop"

[window.conn_events]
mode = "local"
max_window_bytes = "256MB"
over_cap = "30m"

[window.network_alerts]
mode = "local"
max_window_bytes = "64MB"
over_cap = "1h"

[logging]
level = "info"
format = "plain"
file = "logs/wf-engine.log"
