mode = "daemon"
sinks = "sinks"

[[sources]]
type = "tcp"
name = "ingress_tcp"
addr = "127.0.0.1"
port = "9800"
framing = "len"
data_format = "arrow_framed"

# 可选：从 NDJSON 文件回放到指定 stream（一次性读完）。
# [[sources]]
# type = "file"
# name = "seed_auth"
# path = "pipeline/data/auth_events.ndjson"
# stream = "syslog"
# data_format = "ndjson"

[runtime]
executor_parallelism = 2
rule_exec_timeout = "30s"
schemas = "count/schemas/*.wfs"
rules   = "count/rules/*.wfl"

[window_defaults]
evict_interval = "30s"
max_window_bytes = "256MB"
max_total_bytes = "2GB"
evict_policy = "time_first"
watermark = "5s"
allowed_lateness = "0s"
late_policy = "drop"

[window.auth_events]
mode = "local"
max_window_bytes = "256MB"
over_cap = "30m"

[window.security_alerts]
mode = "local"
max_window_bytes = "64MB"
over_cap = "1h"

[vars]
FAIL_THRESHOLD = "3"

[logging]
level = "info"
format = "plain"
file = "logs/wf-engine.log"
[logging.modules]
"wf_runtime::receiver" = "info"
